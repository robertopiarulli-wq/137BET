name: Aggiornamento Quote e Analisi
on:
  schedule:
    - cron: '0 8 * * *' # Esegue ogni mattina alle 8
  workflow_dispatch:

jobs:
  update-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with: {python-version: '3.9'}
      - name: Install dependencies
        run: pip install requests supabase numpy scipy
      - name: Run Analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main_script.py
