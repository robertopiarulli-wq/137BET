name: 137BET Automation

on:
  schedule:
    # Gira ogni mattina alle 05:00 UTC (06:00 ora italiana)
    - cron: '0 5 * * *'
  workflow_dispatch: # Permette il lancio manuale per i test

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Aumentato leggermente per gestire la verifica
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install numpy requests scipy supabase thefuzz python-Levenshtein

      - name: Step 1 - Update Form Data (Leghe + Medie Gol)
        run: python update_teams.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Step 2 - Run Quantum Analysis & Save Predictions
        run: python bet_engine.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Step 3 - Verify Past Results (Audit & Stats)
        run: python verify_results.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

# FORZATURA CRON: 137BET_SYNC_3.0_GOLD_AUDIT
# Implementato sistema di tracking automatico is_correct su Supabase.
