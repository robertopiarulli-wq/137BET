name: Bet Engine Daily Analysis

on:
  schedule:
    # Gira ogni giorno alle 08:00 UTC (09:00 o 10:00 in Italia a seconda dell'ora legale)
    - cron: '0 8 * * *'
  workflow_dispatch: # Ti permette di farlo partire a mano quando vuoi tu per testare

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installazione dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install numpy requests scipy supabase

      - name: Esecuzione Analisi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python bet_engine.py
