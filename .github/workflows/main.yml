name: 137BET Automation

on:
  schedule:
    # 08:00 UTC corrisponde alle 09:00 in Italia (con ora solare)
    - cron: '0 8 * * *'
  workflow_dispatch: # Questo pulsante DEVE esserci per i test manuali

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install numpy requests scipy supabase thefuzz python-Levenshtein

      - name: Step 1 - Update Form Data
        run: python update_teams.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Step 2 - Run Dixon-Coles Analysis
        run: python bet_engine.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
