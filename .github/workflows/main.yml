name: Daily Betting Analysis

on:
  schedule:
    - cron: '0 8 * * *' # Gira ogni giorno alle 8 di mattina
  workflow_dispatch: # Ti permette di lanciarlo a mano quando vuoi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: abc... # (setup python)

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update Team Stats and Form
        run: python update_teams.py # Fase 1: Aggiorna la forma
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          ...

      - name: Run Analysis and Send Telegram
        run: python bet_engine.py # Fase 2: Calcola e invia
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          ...
