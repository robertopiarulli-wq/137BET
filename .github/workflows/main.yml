name: 137BET Automation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # <--- EVITA SPRECO DI MINUTI SE IL CODICE SI BLOCCA
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install numpy requests scipy supabase thefuzz python-Levenshtein

      - name: Step 1 - Update Form Data
        run: python update_teams.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Step 2 - Run Dixon-Coles Analysis
        run: python bet_engine.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

