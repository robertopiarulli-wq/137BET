name: Betting Engine Analysis

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permette di far partire il bot manualmente dalla tab "Actions"

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    # QUESTO È IL BLOCCO FONDAMENTALE CHE MANCAVA
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy requests scipy supabase

      - name: Run Betting Engine
        run: python bet_engine.py
